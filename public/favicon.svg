<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded chip outline -->
  <rect x="2" y="2" width="60" height="60" rx="10" ry="10"
        fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Meander electrode (gold, top half): rail with periodic frame cells -->
  <!-- Rail -->
  <path d="M 8 22 H 56" stroke="#daa520" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Cell frames -->
  <g stroke="#daa520" stroke-width="2" fill="none" stroke-linejoin="round">
    <rect x="11" y="10" width="7" height="9" rx="0.5"/>
    <rect x="22" y="10" width="7" height="9" rx="0.5"/>
    <rect x="33" y="10" width="7" height="9" rx="0.5"/>
    <rect x="44" y="10" width="7" height="9" rx="0.5"/>
  </g>
  <!-- Mirror meander (bottom half) -->
  <path d="M 8 42 H 56" stroke="#daa520" stroke-width="3" fill="none" stroke-linecap="round"/>
  <g stroke="#daa520" stroke-width="2" fill="none" stroke-linejoin="round">
    <rect x="11" y="45" width="7" height="9" rx="0.5"/>
    <rect x="22" y="45" width="7" height="9" rx="0.5"/>
    <rect x="33" y="45" width="7" height="9" rx="0.5"/>
    <rect x="44" y="45" width="7" height="9" rx="0.5"/>
  </g>
  <!-- Optical waveguide (green) running through the middle -->
  <path d="M 0 32 H 64" stroke="#10b981" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 0 32 H 64" stroke="#34d399" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
